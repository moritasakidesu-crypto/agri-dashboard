<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOUVATION | 農業市場価格ダッシュボード</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
</head>
<body style="margin:0;background:#020d06;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

    const SHEET_ID = "1-KKGkDX1lmjScHw_A-YJ_cyOcM5hINaqnFoHBkLb_Ig";
    const SHEET_GID = "1613031384";
    const CSV_URL = "https://script.google.com/macros/s/AKfycbyyHAdOwwj0BCJ3f3WDVN8vpxxqg9xvdFX8-c1HXWM1zvE9j2Auef0Y159XaJTiJp2G/exec";

    const ITEM_COLORS = {
      "キャベツ": "#00ff87","人参": "#ff6b35","ほうれん草": "#39ff14","小松菜": "#7fff00",
      "玉ねぎ": "#ffd700","じゃがいも": "#c8a96e","白菜": "#b0e0e6","トマト": "#ff3366",
      "ネギ": "#adff2f","きゅうり": "#00ccff","ナス": "#bf5fff","レタス": "#90ee90",
      "ピーマン": "#ff9f1c","大根": "#e0e0e0"
    };
    const MARKET_COLORS = {
      "大田": "#00ff87","名古屋": "#ff6b35","大阪": "#ffd700",
      "広島": "#ff3366","福岡": "#bf5fff","仙台": "#39ff14","札幌": "#00ccff"
    };

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      return lines.map(line => {
        const result = [];
        let cur = "", inQ = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQ = !inQ; }
          else if (line[i] === "," && !inQ) { result.push(cur.trim()); cur = ""; }
          else { cur += line[i]; }
        }
        result.push(cur.trim());
        return result;
      });
    }

    function buildMarketsData(rows) {
      if (!rows || rows.length < 2) return { dates: [], data: {} };
      const clean = v => (v || "").replace(/"/g, "").trim();
      const headerRow = rows[0];
      const dates = [];
      for (let c = 1; c < headerRow.length; c++) {
        const d = clean(headerRow[c]);
        if (d) dates.push(d);
      }
      const data = {};
      let currentMarket = null;
      const marketSuffix = "市場";
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        const col0 = clean(row[0]);
        if (!col0) continue;
        const isMarketRow = col0.endsWith(marketSuffix) || row.slice(1).every(v => !clean(v));
        if (isMarketRow) {
          currentMarket = col0.replace(marketSuffix, "");
          if (!data[currentMarket]) data[currentMarket] = {};
          continue;
        }
        if (currentMarket) {
          const item = col0;
          const prices = [];
          for (let c = 1; c <= dates.length; c++) {
            const val = clean(row[c]);
            prices.push(val === "" || val === "-" ? null : (parseFloat(val) || null));
          }
          if (prices.some(p => p !== null)) {
            data[currentMarket][item] = prices;
          }
        }
      }
      return { dates, data };
    }

    const getTrend = (current, prev) => {
      if (!prev || prev === 0) return "→";
      if (current > prev) return "↑";
      if (current < prev) return "↓";
      return "→";
    };

    const styles = `
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #020d06; color: #c8e6ff; font-family: 'Rajdhani', sans-serif; }
      .dashboard {
        min-height: 100vh; background: #020d06;
        background-image:
          radial-gradient(ellipse at 20% 20%, rgba(0,150,60,0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(0,200,200,0.06) 0%, transparent 50%),
          repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,220,100,0.02) 40px, rgba(0,220,100,0.02) 41px),
          repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,220,100,0.02) 40px, rgba(0,220,100,0.02) 41px);
        padding: 0 0 40px 0;
      }
      .header {
        border-bottom: 1px solid rgba(0,220,100,0.2); padding: 16px 32px;
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(0,25,10,0.9); backdrop-filter: blur(10px);
        position: sticky; top: 0; z-index: 100;
      }
      .header-right { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: rgba(0,220,100,0.7); text-align: right; }
      .status-dot {
        display: inline-block; width: 8px; height: 8px; background: #39ff14;
        border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #39ff14;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .main { padding: 20px 32px; max-width: 1600px; margin: 0 auto; }
      .market-tabs {
        display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap;
        border-bottom: 1px solid rgba(0,220,100,0.15);
      }
      .market-tab {
        padding: 8px 20px; font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: 15px; letter-spacing: 2px; cursor: pointer;
        border: 1px solid transparent; border-bottom: none;
        background: transparent; color: rgba(0,220,100,0.4); transition: all 0.2s;
        clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      }
      .market-tab:hover { color: rgba(0,220,100,0.8); background: rgba(0,150,60,0.1); }
      .market-tab.active { color: #030b14; }
      .loading-banner {
        background: rgba(0,150,255,0.05); border: 1px solid rgba(0,150,255,0.2);
        padding: 20px 24px; margin-bottom: 20px; text-align: center;
        font-family: 'Share Tech Mono', monospace; font-size: 13px; color: rgba(0,150,255,0.8);
        letter-spacing: 2px; animation: pulse 1.5s infinite;
        clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      }
      .error-banner {
        background: rgba(255,50,50,0.05); border: 1px solid rgba(255,50,50,0.2);
        padding: 16px 24px; margin-bottom: 20px;
        font-family: 'Share Tech Mono', monospace; font-size: 12px; color: rgba(255,100,100,0.8);
        clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      }
      .reload-btn {
        margin-top: 10px; padding: 8px 20px; background: transparent;
        border: 1px solid rgba(0,220,100,0.4); color: #00ff87;
        font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 2px;
        font-size: 13px; cursor: pointer; transition: all 0.2s;
        clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      }
      .reload-btn:hover { background: rgba(0,220,100,0.1); }
      .controls { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
      .control-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(0,220,100,0.5); letter-spacing: 2px; text-transform: uppercase; }
      .select-wrapper { position: relative; }
      select {
        appearance: none; background: rgba(0,20,10,0.9); border: 1px solid rgba(0,220,100,0.3);
        color: #00ff87; padding: 8px 36px 8px 14px; font-family: 'Rajdhani', sans-serif;
        font-size: 14px; font-weight: 600; cursor: pointer; outline: none;
        clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
      }
      .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #00ff87; pointer-events: none; font-size: 10px; }
      .item-pills { display: flex; gap: 6px; flex-wrap: wrap; }
      .item-pill {
        padding: 5px 14px; font-family: 'Rajdhani', sans-serif; font-weight: 600;
        font-size: 13px; cursor: pointer; border: 1px solid rgba(0,220,100,0.2);
        background: rgba(0,20,10,0.5); color: rgba(0,220,100,0.5); transition: all 0.2s;
        clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      }
      .item-pill:hover { color: #00ff87; background: rgba(0,150,60,0.2); }
      .item-pill.active { color: #030b14; }
      .section-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
      .section-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(0,220,100,0.5); letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; }
      .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,220,100,0.3), transparent); }
      .chart-panel {
        background: rgba(0,20,8,0.8); border: 1px solid rgba(0,220,100,0.15);
        clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        padding: 24px; margin-bottom: 28px; position: relative;
      }
      .chart-panel::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, #00ff87, transparent);
      }
      .chart-title { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: #c8e6ff; margin-bottom: 4px; text-transform: uppercase; }
      .chart-meta { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(0,220,100,0.4); margin-bottom: 20px; }
      .week-table-wrapper { overflow-x: auto; margin-bottom: 28px; }
      .week-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
      .week-table th {
        font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px;
        color: rgba(0,220,100,0.5); padding: 10px 14px; text-align: center;
        border-bottom: 1px solid rgba(0,220,100,0.15); white-space: nowrap; background: rgba(0,20,10,0.5);
      }
      .week-table th:first-child { text-align: left; }
      .week-table td {
        padding: 10px 14px; text-align: center; border-bottom: 1px solid rgba(0,220,100,0.06);
        font-family: 'Share Tech Mono', monospace; font-size: 12px; white-space: nowrap;
      }
      .week-table td:first-child { text-align: left; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; }
      .week-table tr:hover td { background: rgba(0,220,100,0.04); }
      .trend-up { color: #ff3366; }
      .trend-down { color: #00ff87; }
      .trend-flat { color: #ffd700; }
      .price-cell { display: flex; align-items: center; justify-content: center; gap: 4px; }
      .no-data { color: rgba(0,220,100,0.2); }
      .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 28px; }
      .stat-card {
        background: rgba(0,20,8,0.8); border: 1px solid rgba(0,220,100,0.12); padding: 14px 16px;
        position: relative; overflow: hidden;
        clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
      }
      .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: rgba(0,220,100,0.3); clip-path: polygon(100% 0, 0 0, 100% 100%); }
      .stat-item-name { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: rgba(0,220,100,0.6); text-transform: uppercase; margin-bottom: 6px; }
      .stat-price { font-family: 'Share Tech Mono', monospace; font-size: 22px; font-weight: 700; margin-bottom: 2px; }
      .stat-unit { font-size: 10px; color: rgba(0,220,100,0.4); font-family: 'Share Tech Mono', monospace; }
      .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .custom-tooltip { background: rgba(2,14,6,0.95); border: 1px solid rgba(0,220,100,0.3); padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
      .tooltip-date { color: rgba(0,220,100,0.6); margin-bottom: 4px; font-size: 11px; }
      .footer-bar { text-align: center; margin-top: 32px; font-family: 'Share Tech Mono'; font-size: 11px; color: rgba(0,220,100,0.25); letter-spacing: 2px; }
      .last-updated { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(0,220,100,0.4); margin-top: 4px; }
    `;

    const CustomTooltip = ({ active, payload, label }) => {
      if (active && payload && payload.length) {
        return (
          <div className="custom-tooltip">
            <div className="tooltip-date">{label}</div>
            {payload.map((p, i) => (
              <div key={i} style={{ color: p.color, fontSize: 13, marginTop: 2 }}>
                {p.name}: <strong>¥{p.value}</strong>
              </div>
            ))}
          </div>
        );
      }
      return null;
    };

    function MarketDashboard() {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [marketsData, setMarketsData] = useState({});
      const [dates, setDates] = useState([]);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [selectedMarket, setSelectedMarket] = useState("");
      const [selectedItems, setSelectedItems] = useState([]);
      const [chartRange, setChartRange] = useState("30");

      const fetchData = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(CSV_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          const rows = parseCSV(text);
          const { dates: d, data: md } = buildMarketsData(rows);
          setDates(d);
          setMarketsData(md);
          const markets = Object.keys(md);
          if (markets.length > 0) {
            setSelectedMarket(prev => markets.includes(prev) ? prev : markets[0]);
            const items = Object.keys(md[markets[0]] || {});
            setSelectedItems(prev => prev.length > 0 && prev.every(i => items.includes(i)) ? prev : items.slice(0, 3));
          }
          setLastUpdated(new Date().toLocaleString("ja-JP"));
        } catch(e) {
          setError(`データ取得エラー: ${e.message}`);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const marketNames = Object.keys(marketsData);
      const items = selectedMarket ? Object.keys(marketsData[selectedMarket] || {}) : [];
      const marketColor = MARKET_COLORS[selectedMarket] || "#00ff87";

      const toggleItem = (item) => {
        setSelectedItems(prev =>
          prev.includes(item) ? prev.filter(i => i !== item)
          : prev.length < 5 ? [...prev, item] : prev
        );
      };

      const chartData = useMemo(() => {
        if (!selectedMarket || !dates.length) return [];
        const allData = {};
        selectedItems.forEach(item => {
          const prices = marketsData[selectedMarket]?.[item] || [];
          dates.forEach((date, i) => {
            const price = prices[i];
            if (price !== null && price !== undefined) {
              if (!allData[date]) allData[date] = { date: date.slice(5) };
              allData[date][item] = price;
            }
          });
        });
        const sorted = Object.entries(allData).sort(([a],[b]) => a < b ? -1 : 1);
        return sorted.slice(-parseInt(chartRange)).map(([,v]) => v);
      }, [selectedMarket, selectedItems, chartRange, dates, marketsData]);

      const latestPrices = useMemo(() => {
        if (!selectedMarket) return [];
        return items.map(item => {
          const prices = (marketsData[selectedMarket]?.[item] || []).filter(p => p !== null && p > 0);
          const last = prices[prices.length - 1];
          const prev = prices[prices.length - 2];
          return { item, price: last, trend: getTrend(last, prev) };
        });
      }, [selectedMarket, items, marketsData]);

      const weekDates = useMemo(() => dates.slice(-7), [dates]);
      const now = new Date();
      const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;

      return (
        <>
          <style>{styles}</style>
          <div className="dashboard">
            <div className="header" style={{ borderBottomColor: `${marketColor}33` }}>
              <div style={{ display:"flex", alignItems:"center", gap:20 }}>
                <div style={{ borderLeft:`3px solid ${marketColor}`, paddingLeft:16, display:"flex", alignItems:"center", gap:12 }}>
                  <img src={`data:image/png;base64,${LOGO_B64}`} alt="NOUVATION" style={{ height:40, filter:`drop-shadow(0 0 8px ${marketColor}66)`, objectFit:"contain" }} />
                  <div style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:10, letterSpacing:3, color:`${marketColor}99`, textTransform:"uppercase" }}>
                    農業市場価格 ダッシュボード
                  </div>
                </div>
              </div>
              <div className="header-right">
                <div><span className="status-dot"></span>{loading ? "LOADING..." : error ? "ERROR" : "LIVE DATA"}</div>
                <div style={{ marginTop:4 }}>{dateStr}{selectedMarket ? ` // ${selectedMarket}市場` : ""}</div>
                {lastUpdated && <div className="last-updated">更新: {lastUpdated}</div>}
              </div>
            </div>

            <div className="main">
              {loading && <div className="loading-banner">⟳ &nbsp; データ取得中... // FETCHING LIVE DATA</div>}
              {error && (
                <div className="error-banner">
                  ⚠ {error}<br/>
                  <button className="reload-btn" onClick={fetchData}>↺ 再読み込み</button>
                </div>
              )}

              {!loading && !error && (
                <>
                  <div className="market-tabs">
                    {marketNames.map(market => (
                      <button key={market} className={`market-tab ${selectedMarket===market?"active":""}`}
                        onClick={() => { setSelectedMarket(market); setSelectedItems(Object.keys(marketsData[market]||{}).slice(0,3)); }}
                        style={selectedMarket===market ? { background: MARKET_COLORS[market]||"#00ff87", color:"#020d06", boxShadow:`0 0 20px ${(MARKET_COLORS[market]||"#00ff87")}44` } : {}}
                      >{market}</button>
                    ))}
                  </div>

                  <div className="section-divider">
                    <span className="section-label">// 最新価格スナップショット — {selectedMarket}</span>
                    <div className="divider-line"></div>
                  </div>
                  <div className="stats-grid">
                    {latestPrices.map(({ item, price, trend }) => (
                      <div className="stat-card" key={item} style={{ borderColor: price ? `${ITEM_COLORS[item]||"#00ff87"}33` : "rgba(0,220,100,0.12)" }}>
                        <div className="stat-item-name"><span className="color-dot" style={{ background: ITEM_COLORS[item]||"#00ff87" }}></span>{item}</div>
                        {price ? (
                          <div style={{ display:"flex", alignItems:"baseline" }}>
                            <span className="stat-price" style={{ color: ITEM_COLORS[item]||"#00ff87" }}>¥{price}</span>
                            <span className={`${trend==="↑"?"trend-up":trend==="↓"?"trend-down":"trend-flat"}`} style={{ fontSize:16, fontWeight:700, marginLeft:6 }}>{trend}</span>
                          </div>
                        ) : <div className="stat-price no-data">—</div>}
                        <div className="stat-unit">円/kg</div>
                      </div>
                    ))}
                  </div>

                  <div className="section-divider">
                    <span className="section-label">// 価格推移グラフ</span>
                    <div className="divider-line"></div>
                  </div>
                  <div className="controls">
                    <span className="control-label">品目選択（最大5）:</span>
                    <div className="item-pills">
                      {items.map(item => (
                        <button key={item} className={`item-pill ${selectedItems.includes(item)?"active":""}`}
                          onClick={() => toggleItem(item)}
                          style={selectedItems.includes(item) ? { background:ITEM_COLORS[item]||"#00ff87", borderColor:ITEM_COLORS[item]||"#00ff87", color:"#020d06", boxShadow:`0 0 14px ${(ITEM_COLORS[item]||"#00ff87")}66` } : {}}
                        >{item}</button>
                      ))}
                    </div>
                    <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
                      <span className="control-label">表示期間:</span>
                      <div className="select-wrapper">
                        <select value={chartRange} onChange={e => setChartRange(e.target.value)}>
                          <option value="14">直近14日</option>
                          <option value="30">直近30日</option>
                          <option value="60">直近60日</option>
                          <option value="999">全期間</option>
                        </select>
                        <span className="select-arrow">▼</span>
                      </div>
                      <button className="reload-btn" onClick={fetchData}>↺ 更新</button>
                    </div>
                  </div>

                  <div className="chart-panel">
                    <div className="chart-title">市場価格推移 — {selectedMarket}市場</div>
                    <div className="chart-meta">{selectedItems.join(" / ")} // DATA POINTS: {chartData.length}</div>
                    {chartData.length > 0 ? (
                      <ResponsiveContainer width="100%" height={320}>
                        <LineChart data={chartData} margin={{ top:5, right:20, bottom:5, left:10 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,220,100,0.08)" vertical={false} />
                          <XAxis dataKey="date" tick={{ fill:"rgba(0,220,100,0.5)", fontSize:10, fontFamily:"Share Tech Mono" }} axisLine={{ stroke:"rgba(0,220,100,0.2)" }} tickLine={false} interval="preserveStartEnd" />
                          <YAxis tick={{ fill:"rgba(0,220,100,0.5)", fontSize:10, fontFamily:"Share Tech Mono" }} axisLine={false} tickLine={false} tickFormatter={v => `¥${v}`} />
                          <Tooltip content={<CustomTooltip />} />
                          <Legend wrapperStyle={{ fontFamily:"Rajdhani,sans-serif", fontSize:13 }} />
                          {selectedItems.map(item => (
                            <Line key={item} type="monotone" dataKey={item} stroke={ITEM_COLORS[item]||"#00ff87"} strokeWidth={2} dot={false} activeDot={{ r:4, strokeWidth:0 }} connectNulls />
                          ))}
                        </LineChart>
                      </ResponsiveContainer>
                    ) : (
                      <div style={{ height:200, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(0,220,100,0.25)", fontFamily:"Share Tech Mono", fontSize:13, letterSpacing:3 }}>NO DATA AVAILABLE</div>
                    )}
                  </div>

                  <div className="section-divider">
                    <span className="section-label">// 過去7日間 価格テーブル — {selectedMarket}</span>
                    <div className="divider-line"></div>
                  </div>
                  <div className="week-table-wrapper">
                    <div className="chart-panel" style={{ padding:0, overflow:"hidden" }}>
                      <table className="week-table">
                        <thead>
                          <tr>
                            <th>品目</th>
                            {weekDates.map(d => <th key={d}>{d.slice(5)}</th>)}
                            <th>前日比</th>
                          </tr>
                        </thead>
                        <tbody>
                          {items.map(item => {
                            const prices = marketsData[selectedMarket]?.[item] || [];
                            const priceMap = {};
                            dates.forEach((d,i) => { if(prices[i]!=null) priceMap[d]=prices[i]; });
                            const lastPrices = weekDates.map(d => priceMap[d]||null);
                            const last = lastPrices.filter(Boolean).slice(-1)[0];
                            const prev = lastPrices.filter(Boolean).slice(-2)[0];
                            return (
                              <tr key={item}>
                                <td><span className="color-dot" style={{ background:ITEM_COLORS[item]||"#00ff87" }}></span>{item}</td>
                                {weekDates.map((d,i) => {
                                  const price = priceMap[d];
                                  const prevP = i>0 ? (priceMap[weekDates[i-1]]||null) : null;
                                  const t = price && prevP ? getTrend(price,prevP) : null;
                                  return (
                                    <td key={d}>
                                      {price ? <div className="price-cell"><span>¥{price}</span>{t && <span className={`${t==="↑"?"trend-up":t==="↓"?"trend-down":"trend-flat"}`}>{t}</span>}</div> : <span className="no-data">—</span>}
                                    </td>
                                  );
                                })}
                                <td><span className={`${getTrend(last,prev)==="↑"?"trend-up":getTrend(last,prev)==="↓"?"trend-down":"trend-flat"}`} style={{ fontSize:20 }}>{last ? getTrend(last,prev) : "—"}</span></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </>
              )}
              <div className="footer-bar">NOUVATION AGRI PRICE NEXUS // DATA SOURCE: GOOGLE SHEETS // LIVE</div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MarketDashboard />);
  </script>
</body>
</html>
