<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NOUVATION | 農業市場価格ダッシュボード</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f4f7f4;color:#1a2e1a;font-family:"Noto Sans JP",sans-serif}
    /* HEADER */
    .header{padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#2d6a4f,#1b4332);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .header-left{display:flex;align-items:center;gap:10px}
    .header-logo-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.5px}
    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
    .status-area{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.7)}
    .status-dot{display:inline-block;width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .hbtn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;overflow:hidden;padding:0;flex-shrink:0}
    .hbtn:hover{background:rgba(255,255,255,.28)}
    .action-btn{padding:6px 12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
    .action-btn:hover{background:rgba(255,255,255,.25)}
    /* 目立つアクションボタン（コンテンツ内） */
    .cta-btn-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .cta-btn{display:flex;align-items:center;gap:8px;padding:12px 22px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .22s;font-family:inherit;box-shadow:0 3px 12px rgba(0,0,0,.12)}
    .cta-btn-sim{background:linear-gradient(135deg,#2d6a4f,#16a34a);color:#fff}
    .cta-btn-sim:hover{box-shadow:0 6px 20px rgba(22,163,74,.35);transform:translateY(-2px)}
    .cta-btn-forecast{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
    .cta-btn-forecast:hover{box-shadow:0 6px 20px rgba(37,99,235,.35);transform:translateY(-2px)}
    .cta-btn-icon{font-size:20px;line-height:1}
    .cta-btn-text{display:flex;flex-direction:column;text-align:left}
    .cta-btn-label{font-size:14px;font-weight:700;line-height:1.2}
    .cta-btn-sub{font-size:11px;opacity:.82;font-weight:400;margin-top:2px}
    /* MAIN */
    .main{padding:24px 32px;max-width:1440px;margin:0 auto}
    .section-divider{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .section-label{font-size:12px;color:#6b9080;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;font-weight:700}
    .divider-line{flex:1;height:1px;background:#d8eadd}
    /* MARKET TABS */
    .market-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .market-tab{padding:8px 18px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #c8e0d0;border-radius:100px;background:#fff;color:#4a7c59;transition:all .2s;font-family:inherit}
    .market-tab:hover{border-color:#2d6a4f;color:#1b4332}
    .market-tab.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(27,67,50,.3)}
    .market-tab.avg-tab{background:#f0fdf4;border-color:#86efac;color:#15803d}
    .market-tab.avg-tab.active{background:#15803d;color:#fff}
    /* CONTROLS */
    .controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .control-label{font-size:13px;color:#6b9080;font-weight:600}
    .select-wrapper{position:relative}
    select{appearance:none;background:#fff;border:1.5px solid #c8e0d0;color:#1b4332;padding:8px 28px 8px 12px;border-radius:8px;font-size:14px;cursor:pointer;outline:none;font-family:inherit}
    select:hover{border-color:#2d6a4f}
    .select-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:#6b9080;pointer-events:none;font-size:10px}
    .item-pills{display:flex;gap:6px;flex-wrap:wrap}
    .item-pill{padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #c8e0d0;border-radius:100px;background:#fff;color:#4a7c59;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:5px}
    .item-pill:hover{border-color:#2d6a4f}
    .item-pill.active{color:#fff;border-color:transparent;font-weight:600}
    .item-pill.fav{position:relative}
    .fav-star{font-size:11px;opacity:.7}
    .update-btn{padding:8px 16px;background:#fff;border:1.5px solid #c8e0d0;color:#2d6a4f;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .update-btn:hover{background:#f0fdf4;border-color:#2d6a4f}
    /* FAVORITE BAR */
    .fav-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .fav-bar-label{font-size:12px;font-weight:700;color:#15803d}
    .fav-chip{padding:4px 12px;font-size:12px;background:#fff;border:1.5px solid #86efac;border-radius:100px;color:#15803d;cursor:pointer;font-family:inherit;transition:all .2s}
    .fav-chip:hover{background:#dcfce7}
    /* DATE RANGE PICKER */
    .date-range-bar{background:#fff;border:1px solid #ddeee2;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .date-range-bar label{font-size:13px;color:#6b9080;font-weight:600}
    .date-range-bar input[type=date]{border:1.5px solid #c8e0d0;border-radius:8px;padding:6px 10px;font-size:13px;color:#1b4332;background:#f8fdf9;outline:none;font-family:inherit;cursor:pointer}
    .date-range-bar input[type=date]:hover{border-color:#2d6a4f}
    .date-apply-btn{padding:7px 16px;background:#2d6a4f;border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
    .date-apply-btn:hover{background:#1b4332}
    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;margin-bottom:24px}
    .stat-card{background:#fff;border:1px solid #ddeee2;border-radius:12px;padding:15px;transition:all .2s;box-shadow:0 1px 4px rgba(27,67,50,.05);cursor:default}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(27,67,50,.1)}
    .stat-item-name{font-size:12px;font-weight:700;letter-spacing:1px;color:#6b9080;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
    .stat-price{font-family:"JetBrains Mono",monospace;font-size:26px;font-weight:700;color:#1b4332;line-height:1.1}
    .stat-trend{font-size:18px;font-weight:700;margin-top:4px}
    .stat-unit{font-size:11px;color:#6b9080;margin-top:3px}
    .color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .trend-up{color:#16a34a}.trend-down{color:#dc2626}.trend-flat{color:#9ca3af}
    /* CHART */
    .chart-panel{background:#fff;border:1px solid #ddeee2;border-radius:16px;padding:22px;margin-bottom:22px;box-shadow:0 2px 12px rgba(27,67,50,.05)}
    .chart-title{font-size:16px;font-weight:700;color:#1b4332;margin-bottom:3px}
    .chart-meta{font-size:12px;color:#6b9080;margin-bottom:12px}
    .chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .legend-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#1b4332;background:#f8fdf9;border:1.5px solid #ddeee2;border-radius:8px;padding:6px 13px;white-space:nowrap}
    .legend-swatch{display:inline-block;width:26px;height:4px;border-radius:3px;flex-shrink:0}
    /* TABLE */
    .week-table-wrapper{overflow-x:auto;margin-bottom:22px}
    .week-table{width:100%;border-collapse:separate;border-spacing:0}
    .week-table th{font-size:12px;font-weight:700;color:#6b9080;padding:12px 14px;text-align:center;border-bottom:1.5px solid #ddeee2;white-space:nowrap;background:#f8fdf9;text-transform:uppercase;letter-spacing:1px}
    .week-table th:first-child{text-align:left}
    .week-table td{padding:11px 14px;text-align:center;border-bottom:1px solid #f0f7f1;font-family:"JetBrains Mono",monospace;font-size:13px;white-space:nowrap;color:#2d4a35}
    .week-table td:first-child{text-align:left;font-family:"Noto Sans JP",sans-serif;font-size:14px;font-weight:600;color:#1b4332}
    .week-table tr.avg-row td{background:#f0fdf4;font-weight:600}
    .week-table tr:hover td{background:#f8fdf9}
    .price-cell{display:flex;align-items:center;justify-content:center;gap:3px}
    .no-data{color:#c8d8c8}
    /* TOOLTIP */
    .custom-tooltip{background:#fff;border:1px solid #ddeee2;border-radius:10px;padding:12px 15px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .tooltip-date{color:#6b9080;margin-bottom:7px;font-size:11px;font-weight:700;letter-spacing:1px}
    .tooltip-row{display:flex;align-items:center;gap:7px;margin-top:4px;font-size:13px}
    /* BANNERS */
    .loading-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px 24px;margin-bottom:18px;text-align:center;font-size:15px;color:#16a34a}
    .error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px 20px;margin-bottom:18px;font-size:13px;color:#dc2626}
    .reload-btn{margin-top:8px;padding:7px 16px;background:transparent;border:1px solid #dc2626;color:#dc2626;border-radius:100px;font-size:12px;cursor:pointer;font-family:inherit}
    /* MODAL OVERLAY */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:16px;padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto}
    .modal h2{font-size:18px;font-weight:700;color:#1b4332;margin-bottom:18px}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#6b9080;line-height:1}
    .modal-close:hover{color:#1b4332}
    /* SIMULATOR */
    .sim-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .sim-row label{font-size:13px;font-weight:600;color:#4a7c59;min-width:80px}
    .sim-input{border:1.5px solid #c8e0d0;border-radius:8px;padding:8px 12px;font-size:14px;width:130px;outline:none;font-family:"JetBrains Mono",monospace;color:#1b4332}
    .sim-input:focus{border-color:#2d6a4f}
    .sim-result{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 18px;margin-top:14px;text-align:center}
    .sim-result-num{font-family:"JetBrains Mono",monospace;font-size:28px;font-weight:700;color:#15803d}
    .sim-result-label{font-size:12px;color:#6b9080;margin-top:3px}
    /* FORECAST */
    .forecast-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f7f1}
    .forecast-price{font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:700}
    .forecast-badge{font-size:11px;padding:3px 9px;border-radius:100px;font-weight:600}
    .badge-up{background:#dcfce7;color:#15803d}
    .badge-down{background:#fee2e2;color:#dc2626}
    .badge-flat{background:#f3f4f6;color:#6b7280}
    /* ── MASCOT ── */
    /* 全体ラッパー：画面右下固定、横並び（吹き出し左・キャラ右） */
    .mascot-wrap{
      position:fixed;bottom:0;right:0;z-index:150;
      display:flex;flex-direction:row;align-items:flex-end;
      padding-right:12px;
    }
    /* 吹き出し本体 */
    .mascot-speech{
      background:#fff;
      border:2px solid #a8dfc0;
      border-radius:20px 20px 4px 20px;  /* 右下だけ尖り気味 → キャラ方向 */
      padding:14px 16px 13px;
      box-shadow:0 8px 32px rgba(27,67,50,.14),0 2px 8px rgba(27,67,50,.08);
      position:relative;
      width:248px;
      margin-bottom:20px;  /* キャラの足元基線に合わせる */
      margin-right:0px;
    }
    /* 吹き出しのしっぽ：右下から右（キャラ方向）へ */
    .mascot-speech::after{
      content:"";position:absolute;
      bottom:18px;right:-13px;
      border:7px solid transparent;
      border-left:13px solid #a8dfc0;
    }
    .mascot-speech::before{
      content:"";position:absolute;
      bottom:19px;right:-10px;
      border:6px solid transparent;
      border-left:11px solid #fff;
      z-index:1;
    }
    /* キャラクター立ち絵 */
    .mascot-char{
      width:82px;display:block;flex-shrink:0;
      cursor:pointer;transition:transform .25s;
      filter:drop-shadow(0 4px 12px rgba(27,67,50,.25));
      position:relative;z-index:1;
    }
    .mascot-char:hover{transform:scale(1.06) translateY(-4px)}
    /* タブ：細くてクリーンなアンダーライン */
    .mascot-tabs{display:flex;margin-bottom:11px;border-bottom:1.5px solid #dff0e7}
    .mascot-tab-btn{
      flex:1;background:none;border:none;padding:4px 2px 7px;
      font-size:11.5px;font-weight:600;color:#b8d4c4;cursor:pointer;
      font-family:inherit;border-bottom:2.5px solid transparent;
      margin-bottom:-1.5px;transition:color .15s,border-color .15s;
      letter-spacing:.3px;
    }
    .mascot-tab-btn.active{color:#2d6a4f;border-bottom-color:#2d6a4f}
    .mascot-tab-btn:hover:not(.active){color:#6b9080}
    /* テキスト */
    .mascot-msg{font-size:12.5px;color:#1b4332;line-height:1.65;font-weight:500}
    .mascot-guide-icon{font-size:20px;text-align:center;margin-bottom:3px}
    .mascot-guide-title{font-size:12.5px;font-weight:700;color:#2d6a4f;text-align:center;margin-bottom:6px}
    .mascot-close{
      position:absolute;top:9px;right:11px;
      background:none;border:none;font-size:12px;cursor:pointer;
      color:#c8dfd0;transition:color .15s;line-height:1;
      width:20px;height:20px;display:flex;align-items:center;justify-content:center;
      border-radius:50%;
    }
    .mascot-close:hover{color:#fff;background:#2d6a4f}
    /* 閉じているときのキャラボタン */
    .mascot-open-btn{
      position:fixed;bottom:0;right:12px;z-index:149;
      background:none;border:none;cursor:pointer;padding:0;
      transition:transform .25s;
      filter:drop-shadow(0 4px 12px rgba(27,67,50,.25));
    }
    .mascot-open-btn:hover{transform:scale(1.08) translateY(-5px)}
    /* SIDE PANEL */
    .layout-wrap{display:flex;gap:0;position:relative}
    .main-content{flex:1;min-width:0;transition:margin-right .3s ease}
    .main-content.shifted{margin-right:300px}
    .fav-panel{position:fixed;top:62px;right:0;width:300px;height:calc(100vh - 62px);background:#fff;border-left:1.5px solid #ddeee2;box-shadow:-4px 0 20px rgba(27,67,50,.1);transform:translateX(100%);transition:transform .3s ease;z-index:100;overflow-y:auto;display:flex;flex-direction:column}
    .fav-panel.open{transform:translateX(0)}
    .fav-panel-header{padding:16px 18px 12px;border-bottom:1px solid #ddeee2;position:sticky;top:0;background:#fff;z-index:1}
    .fav-panel-title{font-size:15px;font-weight:700;color:#1b4332;display:flex;align-items:center;gap:7px}
    .fav-panel-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;line-height:1}
    .fav-panel-close:hover{color:#1b4332}
    .fav-panel-body{padding:14px 16px;flex:1}
    .fav-price-card{background:#f8fdf9;border:1px solid #ddeee2;border-radius:10px;padding:12px 14px;margin-bottom:10px}
    .fav-price-card:last-child{margin-bottom:0}
    .fav-card-name{font-size:12px;font-weight:700;color:#6b9080;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
    .fav-card-price{font-family:"JetBrains Mono",monospace;font-size:24px;font-weight:700;color:#1b4332;line-height:1}
    .fav-card-trend{font-size:15px;font-weight:700;margin-top:3px}
    .fav-card-unit{font-size:11px;color:#9ca3af;margin-top:2px}
    .fav-tab-btn{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:101;background:#2d6a4f;color:#fff;border:none;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;padding:14px 8px;border-radius:8px 0 0 8px;font-size:13px;font-weight:700;letter-spacing:1px;box-shadow:-2px 2px 10px rgba(27,67,50,.2);transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px}
    .fav-tab-btn:hover{background:#1b4332}
    .fav-empty{text-align:center;color:#9ca3af;font-size:13px;padding:30px 0;line-height:1.8}
    /* FOOTER */
    .footer-bar{text-align:center;margin-top:40px;font-size:11px;color:#a0b8a4;letter-spacing:1px;padding-bottom:100px}
    /* RESPONSIVE */
    @media(max-width:768px){
      .main{padding:18px 14px}
      .header{padding:0 12px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .stat-price{font-size:22px}
      .header-logo-sub{display:none}
      .mascot-bubble{max-width:220px;bottom:16px;right:12px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine, ResponsiveContainer } = Recharts;

const CSV_URL = "https://script.google.com/macros/s/AKfycbyd_Or_Nxo2ZhqNk6GOo2btZ-uymgpJTU7kgE8bPWarWVTJ8bDX6QZW3YSD7Bij4Jvs/exec";

  "ジャガイモ":"#92400e","じゃが芋":"#92400e","馬鈴薯":"#92400e",
  "白菜(冬)":"#facc15","ハクサイ":"#facc15","はくさい":"#facc15",
  "薩摩芋":"#a78bfa","サツマイモ":"#a78bfa","さつま芋":"#a78bfa",
  "キュウリ":"#ec4899","胡瓜":"#ec4899",

function getItemColor(item) {
  if (ITEM_COLORS[item]) return ITEM_COLORS[item];
  // 部分一致で探す（例: "にんじん(冬)" → "にんじん" にヒット）
  const key = Object.keys(ITEM_COLORS).find(k => item.includes(k) || k.includes(item));
  return key ? ITEM_COLORS[key] : "#16a34a";
};

function getMascotMessages(items, marketsData, selectedMarkets) {
  const month = new Date().getMonth() + 1;
  const msgs = [];
  items.forEach(item => {
    const info = SEASON_INFO[item];
    if (!info) return;
    const inSeason = info.peak.includes(month);
    const prices = selectedMarkets.flatMap(m => {
      const arr = (marketsData[m]?.[item] || []).filter(p => p !== null && p > 0);
      return arr.slice(-1);
    }).filter(Boolean);
    if (prices.length > 0) {
      const avg = prices.reduce((a,b) => a+b, 0) / prices.length;
      msgs.push({
        item,
        inSeason,
        price: Math.round(avg),
        msg: info.msg
      });
    }
  });
  return msgs;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const result = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === "," && !inQ) { result.push(cur.trim()); cur = ""; }
      else { cur += line[i]; }
    }
    result.push(cur.trim()); return result;
  });
}

function buildMarketsData(rows) {
  const clean = v => (v||"").replace(/"/g,"").trim();
  let headerRow = -1;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].some(c => clean(c) === "日付")) { headerRow = i; break; }
  }
  if (headerRow < 0) return { dates:[], data:{} };
  const header = rows[headerRow];
  const dateIdx = header.findIndex(c => clean(c) === "日付");
  const dates = [];
  for (let c = dateIdx+1; c < header.length; c++) {
    const d = clean(header[c]); if (d) dates.push(d);
  }
  const data = {};
  let currentMarket = null;
  const isMarketRow = row => {
    const col0 = clean(row[0]);
    return col0.endsWith("市場") || row.slice(1).every(v => !clean(v));
  };
  for (let i = headerRow+1; i < rows.length; i++) {
    const row = rows[i]; const col0 = clean(row[0]);
    if (!col0) continue;
    if (isMarketRow(row)) {
      currentMarket = col0;
      if (!data[currentMarket]) data[currentMarket] = {};
      continue;
    }
    if (!currentMarket) continue;
    const prices = [];
    for (let c = 1; c <= dates.length; c++) {
      const val = clean(row[c]); const num = parseFloat(val);
      prices.push(val===""||val==="-"||isNaN(num) ? null : Math.round(num));
    }
    if (prices.some(p => p !== null)) data[currentMarket][col0] = prices;
  }
  return { dates, data };
}

const formatDateShort = d => {
  if (!d) return d;
  const m1 = d.match(/\d{4}[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m1) return `${String(m1[1]).padStart(2,"0")}.${String(m1[2]).padStart(2,"0")}`;
  const months = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  const m2 = d.match(/([A-Za-z]{3})\s+(\d{1,2})/);
  if (m2) return `${months[m2[1]]||"00"}.${String(m2[2]).padStart(2,"0")}`;
  return d.replace(/[\/\-]/g,".").slice(0,5);
};

// 日付文字列をDateオブジェクトへ
const parseDate = d => {
  if (!d) return null;
  const m1 = d.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m1) return new Date(parseInt(m1[1]), parseInt(m1[2])-1, parseInt(m1[3]));
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m2 = d.match(/([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  if (m2) return new Date(parseInt(m2[3]), months[m2[1]]||0, parseInt(m2[2]));
  return null;
};

const getTrend = (cur, prev) => {
  if (!prev || prev===0) return "→";
  if (cur > prev) return "↑";
  if (cur < prev) return "↓";
  return "→";
};

// ── 価格予測（線形回帰） ──
function linearForecast(prices, days=7) {
  const valid = prices.filter((p,i) => p !== null).map((p,i) => p);
  if (valid.length < 3) return null;
  const n = valid.length;
  let sx=0, sy=0, sxy=0, sxx=0;
  for (let i=0; i<n; i++) { sx+=i; sy+=valid[i]; sxy+=i*valid[i]; sxx+=i*i; }
  const slope = (n*sxy - sx*sy) / (n*sxx - sx*sx);
  const intercept = (sy - slope*sx) / n;
  const forecasts = [];
  for (let d=1; d<=days; d++) {
    forecasts.push(Math.max(0, Math.round(intercept + slope*(n+d-1))));
  }
  return { slope, forecasts };
}

      {/* お気に入りタブボタン */}
      {favorites.length > 0 && (
        <button className="fav-tab-btn" onClick={()=>setShowFavPanel(v=>!v)}>
          <span style={{fontSize:16}}>⭐</span>
          {showFavPanel ? "閉じる" : "お気に入り"}
        </button>
      )}

      {/* お気に入りサイドパネル */}
      <div className={`fav-panel${showFavPanel?" open":""}`}>
        <div className="fav-panel-header">
          <div className="fav-panel-title">
            <span>⭐</span> お気に入り価格
          </div>
          <button className="fav-panel-close" onClick={()=>setShowFavPanel(false)}>✕</button>
        </div>
        <div className="fav-panel-body">
          {favPrices.length > 0 ? favPrices.map(fp => (
            <div key={fp.item} className="fav-price-card">
              <div className="fav-card-name">
                <span className="color-dot" style={{background:getItemColor(fp.item)}}></span>
                {fp.item}
              </div>
              <div className="fav-card-price">¥{fp.last?.toLocaleString()}</div>
              <div className={`fav-card-trend ${fp.trend==="↑"?"trend-up":fp.trend==="↓"?"trend-down":"trend-flat"}`}>
                {fp.trend} <span style={{fontSize:12,fontWeight:500,color:"#6b9080"}}>前日比</span>
              </div>
              <div className="fav-card-unit">円 / 10kg（全市場平均）</div>
            </div>
          )) : (
            <div className="fav-empty">
              お気に入りの品目を<br/>ダブルクリックで<br/>登録してください
            </div>
          )}
        </div>
      </div>

      <div className={`main${showFavPanel?" shifted":""}`}>
        {loading && <div className="loading-banner">⟳ &nbsp; データ取得中...</div>}
        {error && (
          <div className="error-banner">
            ⚠ {error}<br/>
            <button className="reload-btn" onClick={fetchData}>↺ 再読み込み</button>
          </div>
        )}

        {!loading && !error && (<>

          {/* お気に入りバー */}
          {favorites.length > 0 && (
            <div className="fav-bar">
              <span className="fav-bar-label">⭐ お気に入り</span>
              {favorites.map(f => (
                <button key={f} className="fav-chip" onClick={()=>toggleItem(f)}>{f}</button>
              ))}
            </div>
          )}

          {/* 市場タブ */}
          <div className="section-divider">
            <span className="section-label">市場選択</span>
            <div className="divider-line"></div>
          </div>
          <div className="market-tabs">
            {marketNames.map(m => (
              <button key={m}
                className={`market-tab${selectedMarkets.includes(m)?" active":""}`}
                style={{background: selectedMarkets.includes(m) ? (MARKET_COLORS[m]||"#16a34a") : ""}}
                onClick={()=>toggleMarket(m)}>{m}</button>
            ))}
            <button
              className={`market-tab avg-tab${showAvg?" active":""}`}
              onClick={()=>setShowAvg(v=>!v)}>
              📊 全市場平均
            </button>
          </div>

          {/* 期間カレンダー */}
          <div className="date-range-bar">
            <label>📅 表示期間：</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} />
            <span style={{color:"#6b9080",fontSize:13}}>〜</span>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} />
            <button className="date-apply-btn" onClick={applyDateRange}>適用</button>
            {(activeDateFrom||activeDateTo) && (
              <button onClick={clearDateRange} style={{padding:"6px 12px",background:"#fff",border:"1.5px solid #fecaca",color:"#dc2626",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                ✕ クリア
              </button>
            )}
          </div>

          {/* コントロール */}
          <div className="controls">
            <span className="control-label">表示件数：</span>
            <div className="select-wrapper">
              <select value={chartRange} onChange={e=>setChartRange(e.target.value)}>
                <option value="14">14日間</option>
                <option value="30">30日間</option>
                <option value="60">60日間</option>
                <option value="90">90日間</option>
                <option value="999">全期間</option>
              </select>
              <span className="select-arrow">▾</span>
            </div>
            <span className="control-label">品目（最大5）：</span>
            <div className="item-pills">
              {items.map(item => (
                <button key={item}
                  className={`item-pill${selectedItems.includes(item)?" active":""}${favorites.includes(item)?" fav":""}`}
                  onClick={()=>toggleItem(item)}
                  onDoubleClick={()=>toggleFav(item)}
                  style={{background: selectedItems.includes(item) ? (getItemColor(item)) : "",
                          borderColor: selectedItems.includes(item) ? "transparent" : ""}}>
                  {favorites.includes(item) && <span className="fav-star">⭐</span>}
                  {item}
                </button>
              ))}
            </div>
            <button className="update-btn" onClick={fetchData}>↺ 更新</button>
          </div>
          <p style={{fontSize:11,color:"#9ca3af",marginBottom:16}}>💡 品目をダブルクリックでお気に入り登録</p>

          {/* アクションボタン */}
          <div className="cta-btn-row">
            <button className="cta-btn cta-btn-sim" onClick={()=>setShowSim(true)}>
              <span className="cta-btn-icon">🧮</span>
              <span className="cta-btn-text">
                <span className="cta-btn-label">仕入れシミュレーター</span>
                <span className="cta-btn-sub">数量×価格で概算コストを計算</span>
              </span>
            </button>
            <button className="cta-btn cta-btn-forecast" onClick={()=>setShowForecast(true)}>
              <span className="cta-btn-icon">📈</span>
              <span className="cta-btn-text">
                <span className="cta-btn-label">価格予測（7日間）</span>
                <span className="cta-btn-sub">線形トレンドで先7日を予測</span>
              </span>
            </button>
          </div>

          {/* グラフ */}
          <div className="section-divider">
            <span className="section-label">価格推移グラフ</span>
            <div className="divider-line"></div>
          </div>
          <div className="chart-panel">
            <div className="chart-title">市場価格推移 — {selectedMarkets.join(" / ")}{showAvg?" + 全市場平均":""}</div>
            <div className="chart-meta">{selectedItems.join(" / ")} / {chartData.length}件</div>
            {legendItems.length>0 && (
              <div className="chart-legend">
                {legendItems.map(li => (
                  <div key={li.key} className="legend-item">
                    {li.dashed
                      ? <span className="legend-swatch" style={{background:"transparent",border:`2px dashed ${li.color}`,height:0}}></span>
                      : <span className="legend-swatch" style={{background:li.color}}></span>
                    }
                    {li.label}
                  </div>
                ))}
              </div>
            )}
            {chartData.length>0 ? (
              <ResponsiveContainer width="100%" height={300}>
                <LineChart data={chartData} margin={{top:5,right:20,bottom:5,left:10}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f7f1" vertical={false}/>
                  <XAxis dataKey="date" tick={{fill:"#6b9080",fontSize:12}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
                  <YAxis tick={{fill:"#6b9080",fontSize:12}} axisLine={false} tickLine={false} tickFormatter={v=>`¥${v.toLocaleString()}`}/>
                  <Tooltip content={<CustomTooltip/>}/>
                  {selectedMarkets.length>1
                    ? selectedMarkets.flatMap(market =>
                        selectedItems.map((item,idx) => {
                          const key=`${market}_${item}`;
                          return <Line key={key} type="monotone" dataKey={key} name={`${market}/${item}`}
                            stroke={MARKET_COLORS[market]||"#16a34a"} strokeWidth={2.5} dot={false}
                            activeDot={{r:5,strokeWidth:0}} connectNulls strokeDasharray={idx%2===1?"6 3":""}/>;
                        })
                      )
                    : selectedItems.map(item => (
                        <Line key={item} type="monotone" dataKey={item}
                          stroke={getItemColor(item)} strokeWidth={2.5} dot={false}
                          activeDot={{r:5,strokeWidth:0,fill:getItemColor(item)}} connectNulls/>
                      ))
                  }
                  {showAvg && selectedItems.map(item => (
                    <Line key={`avg_${item}`} type="monotone" dataKey={`avg_${item}`} name={`平均/${item}`}
                      stroke={AVG_COLOR} strokeWidth={2} strokeDasharray="6 3" dot={false}
                      activeDot={{r:4,strokeWidth:0}} connectNulls/>
                  ))}
                </LineChart>
              </ResponsiveContainer>
            ) : (
              <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"#c8d8c8",fontSize:14}}>
                データがありません
              </div>
            )}
          </div>



          {/* 最新価格カード */}
          <div className="section-divider">
            <span className="section-label">最新価格 — {selectedMarkets.join(" / ")}{showAvg?" + 全市場平均":""}</span>
            <div className="divider-line"></div>
          </div>
          <div className="stats-grid">
            {latestPrices.map(lp =>
              lp.marketPrices.map((mp) => (
                <div key={`${lp.item}_${mp.market}`} className="stat-card">
                  <div className="stat-item-name">
                    <span className="color-dot" style={{background:getItemColor(lp.item)}}></span>
                    {lp.item}
                    {selectedMarkets.length>1 &&
                      <span style={{fontSize:10,color:MARKET_COLORS[mp.market]||"#16a34a",marginLeft:2,fontWeight:700}}>{mp.market}</span>
                    }
                    {favorites.includes(lp.item) && <span style={{fontSize:11}}>⭐</span>}
                  </div>
                  <div className="stat-price">¥{mp.price?.toLocaleString()}</div>
                  <div className={`stat-trend ${mp.trend==="↑"?"trend-up":mp.trend==="↓"?"trend-down":"trend-flat"}`}>
                    {mp.trend}
                    <span style={{fontSize:12,fontWeight:500,marginLeft:4,color:"#6b9080"}}>前日比</span>
                  </div>
                  <div className="stat-unit">円 / 10kg</div>
                </div>
              ))
            )}
            {/* 全市場平均カード */}
            {showAvg && (selectedItems.length>0?selectedItems:items.slice(0,5)).map(item => {
              const avgPrices = (avgData[item]||[]).filter(Boolean);
              const last = avgPrices[avgPrices.length-1];
              const prev = avgPrices[avgPrices.length-2];
              if (!last) return null;
              const trend = getTrend(last,prev);
              return (
                <div key={`avg_${item}`} className="stat-card" style={{border:"1.5px solid #86efac",background:"#f0fdf4"}}>
                  <div className="stat-item-name">
                    <span className="color-dot" style={{background:AVG_COLOR}}></span>
                    {item}
                    <span style={{fontSize:10,color:AVG_COLOR,marginLeft:2,fontWeight:700}}>全市場平均</span>
                  </div>
                  <div className="stat-price" style={{color:AVG_COLOR}}>¥{last?.toLocaleString()}</div>
                  <div className={`stat-trend ${trend==="↑"?"trend-up":trend==="↓"?"trend-down":"trend-flat"}`}>
                    {trend}<span style={{fontSize:12,fontWeight:500,marginLeft:4,color:"#6b9080"}}>前日比</span>
                  </div>
                  <div className="stat-unit">円 / 10kg</div>
                </div>
              );
            })}
          </div>


          {/* 週次テーブル */}
          <div className="section-divider">
            <span className="section-label">過去7日間 価格テーブル — {selectedMarkets.join(" / ")}{showAvg?" + 全市場平均":""}</span>
            <div className="divider-line"></div>
          </div>
          <div className="week-table-wrapper">
            <div className="chart-panel" style={{padding:0,overflow:"hidden"}}>
              <table className="week-table">
                <thead>
                  <tr>
                    <th>品目</th>
                    {weekDates.map(d=><th key={d}>{formatDateShort(d)}</th>)}
                    <th>前日比</th>
                  </tr>
                </thead>
                <tbody>
                  {(selectedItems.length>0?selectedItems:items).map(item =>
                    [...selectedMarkets, ...(showAvg?["__avg__"]:[])].map(market => {
                      let priceMap = {};
                      if (market === "__avg__") {
                        weekDates.forEach(d => {
                          const di = dates.indexOf(d);
                          const vals = marketNames.map(m=>marketsData[m]?.[item]?.[di]).filter(p=>p!=null&&p>0);
                          if (vals.length) priceMap[d] = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
                        });
                      } else {
                        const prices = marketsData[market]?.[item]||[];
                        dates.forEach((d,i)=>{ if(prices[i]!=null) priceMap[d]=prices[i]; });
                      }
                      const lastPrices = weekDates.map(d=>priceMap[d]||null);
                      const last = lastPrices.filter(Boolean).slice(-1)[0];
                      const prev = lastPrices.filter(Boolean).slice(-2)[0];
                      const ft = getTrend(last,prev);
                      const isAvg = market === "__avg__";
                      return (
                        <tr key={`${market}_${item}`} className={isAvg?"avg-row":""}>
                          <td>
                            <span className="color-dot" style={{background:isAvg?AVG_COLOR:(getItemColor(item)),marginRight:6}}></span>
                            {item}
                            {isAvg
                              ? <span style={{fontSize:11,color:AVG_COLOR,marginLeft:6,fontWeight:700}}>全市場平均</span>
                              : selectedMarkets.length>1 && <span style={{fontSize:11,color:MARKET_COLORS[market]||"#16a34a",marginLeft:6,fontWeight:700}}>{market}</span>
                            }
                          </td>
                          {weekDates.map((d,i) => {
                            const price = priceMap[d];
                            const prevP = i>0?(priceMap[weekDates[i-1]]||null):null;
                            const t = price&&prevP?getTrend(price,prevP):null;
                            return (
                              <td key={d}>
                                {price
                                  ? <div className="price-cell">
                                      <span>¥{price.toLocaleString()}</span>
                                      {t && <span className={`${t==="↑"?"trend-up":t==="↓"?"trend-down":"trend-flat"}`}>{t}</span>}
                                    </div>
                                  : <span className="no-data">—</span>
                                }
                              </td>
                            );
                          })}
                          <td>
                            <span className={`${ft==="↑"?"trend-up":ft==="↓"?"trend-down":"trend-flat"}`} style={{fontSize:20,fontWeight:700}}>
                              {last?ft:"—"}
                            </span>
                          </td>
                        </tr>
                      );
                    })
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </>)}

        <div className="footer-bar">© NOUVATION — 農業市場価格ダッシュボード — データソース: Google Sheets</div>
      </div>

      {/* マスコット */}
      {showMascot ? (
        <div className="mascot-wrap">
          {/* 吹き出し（左）＋ キャラクター（右）横並び */}
          <div className="mascot-speech">
            <button className="mascot-close" onClick={e=>{e.stopPropagation();setShowMascot(false);}}>✕</button>
            {/* タブ：アンダーライン型 */}
            <div className="mascot-tabs">
              <button className={`mascot-tab-btn${mascotTab==="guide"?" active":""}`}
                onClick={e=>{e.stopPropagation();setMascotTab("guide");setGuideIdx(0);}}>
                📖 使い方
              </button>
              <button className={`mascot-tab-btn${mascotTab==="season"?" active":""}`}
                onClick={e=>{e.stopPropagation();setMascotTab("season");}}>
                🌱 旬情報
              </button>
            </div>
            {/* コンテンツ */}
            {mascotTab==="guide" ? (
              <div onClick={()=>setGuideIdx(i=>(i+1)%GUIDE_STEPS.length)} style={{cursor:"pointer"}}>
                <div className="mascot-guide-icon">{GUIDE_STEPS[guideIdx].icon}</div>
                <div className="mascot-guide-title">{GUIDE_STEPS[guideIdx].title}</div>
                <div className="mascot-msg">{GUIDE_STEPS[guideIdx].msg}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:9}}>
                  <div style={{display:"flex",gap:5}}>
                    {GUIDE_STEPS.map((_,i)=>(
                      <span key={i} onClick={e=>{e.stopPropagation();setGuideIdx(i);}}
                        style={{width:i===guideIdx?16:6,height:6,borderRadius:3,background:i===guideIdx?"#2d6a4f":"#d1e8d9",display:"inline-block",cursor:"pointer",transition:"all .2s"}}/>
                    ))}
                  </div>
                  <span style={{fontSize:10,color:"#b8d0c0",letterSpacing:".3px"}}>{guideIdx+1} / {GUIDE_STEPS.length}</span>
                </div>
              </div>
            ) : (
              <div onClick={()=>setMascotIdx(i=>(i+1)%Math.max(1,mascotMessages.length))} style={{cursor:"pointer",minHeight:60}}>
                {currentMascot ? (<>
                  <div style={{fontSize:11,fontWeight:700,color:"#6b9080",letterSpacing:".8px",marginBottom:5,textTransform:"uppercase"}}>
                    {currentMascot.inSeason ? "🌿 今が旬！" : "📅 旬カレンダー"}
                  </div>
                  <div className="mascot-msg">{currentMascot.msg}</div>
                  {mascotMessages.length>1 && (
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                      <div style={{display:"flex",gap:5}}>
                        {mascotMessages.map((_,i)=>(
                          <span key={i} style={{width:i===mascotIdx%mascotMessages.length?16:6,height:6,borderRadius:3,background:i===mascotIdx%mascotMessages.length?"#2d6a4f":"#d1e8d9",display:"inline-block",transition:"all .2s"}}/>
                        ))}
                      </div>
                      <span style={{fontSize:10,color:"#b8d0c0"}}>{mascotIdx%mascotMessages.length+1} / {mascotMessages.length}</span>
                    </div>
                  )}
                </>) : (
                  <div style={{fontSize:12.5,color:"#6b9080",lineHeight:1.65,paddingTop:6}}>
                    品目を選択すると<br/>旬情報が表示されます🌿
                  </div>
                )}
              </div>
            )}
          </div>
          {/* キャラクター立ち絵（右） */}
          <img src={MASCOT_IMG} alt="ノウェル" className="mascot-char"
            title="クリックで閉じる"
            onClick={()=>setShowMascot(false)} />
        </div>
      ) : (
        /* 閉じているとき：キャラクターだけ表示（クリックで再表示） */
        <button className="mascot-open-btn" onClick={()=>{setShowMascot(true);setGuideIdx(0);}}>
          <img src={MASCOT_IMG} alt="ノウェル" style={{width:76,display:"block"}} />
        </button>
      )}

      {/* MODALS */}
      {showSim && (
        <SimulatorModal items={items} marketsData={marketsData} selectedMarkets={selectedMarkets} onClose={()=>setShowSim(false)}/>
      )}
      {showForecast && (
        <ForecastModal items={items} marketsData={marketsData} selectedMarkets={selectedMarkets} dates={dates} onClose={()=>setShowForecast(false)}/>
      )}
    </>
  );
}

ReactDOM.render(<MarketDashboard/>, document.getElementById("root"));
</script>
</body>
</html>
